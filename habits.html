<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Habits — Motivation in Motion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="body-with-bottom-nav">
  <script>try{document.body.classList.toggle("dark-mode",localStorage.getItem("motivation-in-motion-dark-mode")==="true");}catch(e){}</script>
  <main class="app-shell">
    <header class="top-header">
      <h1>Your Habits</h1>
      <a href="index.html" class="button-secondary">Back</a>
    </header>

    <section class="card habits-section">
      <h2 class="card-label">Your habits</h2>
      <div id="habitsError" class="habits-error" role="alert" aria-live="polite" hidden></div>
      <div id="habitList" class="habit-list" aria-live="polite">
        <p class="habits-empty">Loading…</p>
      </div>

      <form id="addHabitForm" class="habits-add-form">
        <label for="newHabitInput" class="visually-hidden">New habit name</label>
        <input
          id="newHabitInput"
          type="text"
          class="input-field"
          placeholder="Add a new habit..."
          autocomplete="off"
          maxlength="100"
        />
        <button type="submit" id="addHabitBtn" class="button-primary full-width">
          Add Habit
        </button>
      </form>
    </section>
  </main>

  <nav class="bottom-nav" aria-label="Main">
    <a href="index.html" class="bottom-nav-item" data-page="home"><span>🏠</span><span>Home</span></a>
    <a href="index.html#today" class="bottom-nav-item" data-page="today"><span>✅</span><span>Today</span></a>
    <a href="habits.html" class="bottom-nav-item bottom-nav-item--active" data-page="habits"><span>🧠</span><span>Habits</span></a>
    <a href="groups.html" class="bottom-nav-item" data-page="groups"><span>👥</span><span>Groups</span></a>
    <a href="profile.html" class="bottom-nav-item" data-page="profile"><span>👤</span><span>Profile</span></a>
    <a href="settings.html" class="bottom-nav-item" data-page="settings"><span>⚙️</span><span>Settings</span></a>
  </nav>
  <script type="module" src="js/habits.js"></script>
</body>
</html>
