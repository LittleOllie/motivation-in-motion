<!DOCTYPE html>
<html lang="en">
<head>

  <title>Check-in — Motivation in Motion</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <nav>
      <a href="index.html" class="logo">Motivation in Motion</a>

        <li><a href="index.html">Home</a></li>

  </header>
  <main>
    <section class="checkin">
      <h1>Daily Check-in</h1>
      <form id="checkin-form">
        <label for="checkin-note">How are you doing today?</label>
        <textarea id="checkin-note" name="note" rows="4" placeholder="Share a quick update..."></textarea>
        <button type="submit">Submit check-in</button>
      </form>
      <div class="checkin-history" id="checkin-history">
        <!-- Recent check-ins -->
      </div>
    </section>
  </main>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
