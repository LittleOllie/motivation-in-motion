<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings — Motivation in Motion</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <nav>
      <a href="index.html" class="logo">Motivation in Motion</a>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="profile.html">Profile</a></li>
        <li><a href="settings.html">Settings</a></li>
      </ul>
    </nav>
  </header>
  <main>
    <section class="settings">
      <h1>Settings</h1>
      <div class="settings-card">
        <h2>Account</h2>
        <form id="settings-form">
          <label for="display-name">Display name</label>
          <input type="text" id="display-name" name="displayName">
          <label for="settings-email">Email</label>
          <input type="email" id="settings-email" name="email" readonly>
          <button type="submit">Save changes</button>
        </form>
        <h2>Notifications</h2>
        <label class="toggle">
          <input type="checkbox" id="notifications" name="notifications" checked>
          <span>Check-in reminders</span>
        </label>
      </div>
    </section>
  </main>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
